version: '3.8'

services:
  # --- IL SISTEMA NERVOSO (ROS 2) ---
  drone_ros:
    build:
      context: ./drone_ros_ws
      dockerfile: Dockerfile
    container_name: ros2_humble_dev
    # L'opzione "tty: true" mantiene il container in esecuzione
    tty: true
    stdin_open: true
    environment:
      # Indirizza l'output grafico verso il server XQuartz del Mac
      - DISPLAY=host.docker.internal:0
      # Impedisce errori di rendering su alcuni driver grafici
      - LIBGL_ALWAYS_INDIRECT=1
    volumes:
      # Monta una cartella locale "src" nel workspace del container
      # Utile per scrivere codice dal Mac (es. con VS Code) e compilarlo dentro
      # Mappa la cartella src locale dentro il workspace del container
      - ./drone_ros_ws/src:/ros2_ws/src
    network_mode: "bridge"

  # Puoi già predisporre gli altri servizi per farli comunicare nella stessa rete
  # cognitive_agent:
